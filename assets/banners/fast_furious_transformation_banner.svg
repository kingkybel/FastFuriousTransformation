<svg width="1600" height="400" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Fast Furious Transformation banner">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#041628" />
      <stop offset="60%" stop-color="#0B1F45" />
      <stop offset="100%" stop-color="#172754" />
    </linearGradient>
    <linearGradient id="wave" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0%" stop-color="#58F2A5" />
      <stop offset="50%" stop-color="#7DF7FF" />
      <stop offset="100%" stop-color="#7C70FF" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur in="SourceGraphic" stdDeviation="3" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- Main background -->
  <rect width="1600" height="400" rx="24" fill="url(#bg)" />

  <!-- Waveform lines -->
  <path d="M0 220c120-60 240 80 360 10s240-120 360-20 240 120 360 20 240-140 360-40 240 160 360 30"
        fill="none" stroke="url(#wave)" stroke-width="8" stroke-linecap="round" filter="url(#glow)" />

  <!-- Accent waveform dots -->
  <g fill="#58F2A5">
    <circle cx="480" cy="190" r="8" opacity="0.9" />
    <circle cx="720" cy="160" r="6" opacity="0.8" />
    <circle cx="1040" cy="250" r="6" opacity="0.75" />
    <circle cx="1340" cy="180" r="8" opacity="0.85" />
  </g>

  <!-- Title -->
  <g transform="translate(140, 205)">
    <text font-family="Segoe UI, Arial, sans-serif" font-size="84" font-weight="700" fill="#F7FBFF">Fast Furious</text>
    <text y="70" font-family="Segoe UI, Arial, sans-serif" font-size="70" font-weight="700" fill="#F7FBFF">Transformation</text>
    <text y="130" font-family="Segoe UI, Arial, sans-serif" font-size="32" fill="#D5E7FF">
      High-performance FFT transforms for C++ workloads
    </text>
  </g>

  <!-- Chip icon -->
  <g transform="translate(1200, 220)">
    <rect x="-120" y="-80" width="240" height="140" rx="16" fill="#0F4670" stroke="#74A9FF" stroke-width="6" />
    <rect x="-95" y="-55" width="190" height="100" rx="8" fill="#0A2A4E" />
    <line x1="-70" y1="-45" x2="70" y2="-45" stroke="#7DF7FF" stroke-width="3" />
    <line x1="-70" y1="-15" x2="70" y2="-15" stroke="#7DF7FF" stroke-width="3" />
    <line x1="-70" y1="15" x2="70" y2="15" stroke="#7DF7FF" stroke-width="3" />
    <line x1="-70" y1="45" x2="70" y2="45" stroke="#7DF7FF" stroke-width="3" />
    <circle cx="0" cy="0" r="22" fill="none" stroke="#58F2A5" stroke-width="5" opacity="0.9" />
    <circle cx="0" cy="0" r="6" fill="#58F2A5" />
    <path d="M0,-22 L12,-32 M0,-22 L-12,-32" stroke="#7DF7FF" stroke-width="4" stroke-linecap="round" />
  </g>
</svg>
